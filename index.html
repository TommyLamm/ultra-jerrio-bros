<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>8-Bit Platformer Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    /* Reset and centering */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      background: #0f0f12;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Press Start 2P', 'Courier New', Courier, monospace;
    }

    .game-container {
      position: relative;
      width: min(100vw, calc(100vh * 256 / 240));
      height: auto;
      max-height: 100vh;
      aspect-ratio: 256 / 240;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
      border: 4px solid #28282c;
      border-radius: 8px;
      overflow: hidden;
      background: #000;
    }

    /* Keep canvas pixelated and responsive */
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: -moz-crisp-edges;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      background: #5c94fc;
    }

    .crt-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        rgba(18, 16, 16, 0) 50%, 
        rgba(0, 0, 0, 0.12) 50%
      );
      background-size: 100% 4px;
      z-index: 10;
      pointer-events: none;
    }

    .crt-overlay::after {
      content: " ";
      display: block;
      position: absolute;
      top: 0; left: 0; bottom: 0; right: 0;
      background: radial-gradient(circle, rgba(0,0,0,0) 65%, rgba(0,0,0,0.55) 100%);
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="game-container">
    <canvas id="game" width="256" height="240" aria-label="8-bit platformer game"></canvas>
    <div class="crt-overlay"></div>
  </div>

    const canvas = document.querySelector('#game');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    const game = createGame();
    let latestState = game.snapshot();

    const keys = new Set();
    let startPressed = false;
    let runFireWasDown = false;

    let audioCtx = null;
    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    window.addEventListener('keydown', (event) => {
      initAudio();
      if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Space'].includes(event.code)) {
        event.preventDefault();
      }
      keys.add(event.code);
      if (event.code === 'Enter') {
        startPressed = true;
      }
    });

    window.addEventListener('keyup', (event) => {
      keys.delete(event.code);
    });

    function readInput() {
      return {
        left: keys.has('ArrowLeft') || keys.has('KeyA'),
        right: keys.has('ArrowRight') || keys.has('KeyD'),
        jump: keys.has('KeyZ') || keys.has('Space'),
        runFire: keys.has('KeyX') || keys.has('ShiftLeft') || keys.has('ShiftRight'),
        start: startPressed
      };
    }

    function cameraX(state) {
      const max = state.level.width * state.level.tileSize - canvas.width;
      return Math.max(0, Math.min(max, state.player.x - 96));
    }

    // Generic drawing helper for pixel art grids
    function drawPixelArt(ctx, x, y, matrix, palette, facing = 1, scaleX = 1, scaleY = 1) {
      const height = matrix.length;
      const width = matrix[0].length;
      
      ctx.save();
      ctx.translate(x, y);
      if (facing === -1) {
        ctx.scale(-1, 1);
        ctx.translate(-width * scaleX, 0);
      }
      
      for (let r = 0; r < height; r++) {
        const row = matrix[r];
        for (let c = 0; c < width; c++) {
          const char = row[c];
          if (char !== ' ' && char !== '.') {
            const color = palette[char];
            if (color) {
              ctx.fillStyle = color;
              ctx.fillRect(c * scaleX, r * scaleY, scaleX, scaleY);
            }
          }
        }
      }
      ctx.restore();
    }

    function drawBackground(ctx, camX, state) {
      // Sky color
      ctx.fillStyle = '#5c94fc';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Parallax Clouds (30% speed)
      const cloudCamX = camX * 0.3;
      for (let cx = -100; cx < state.level.width * 16; cx += 160) {
        const x = cx - cloudCamX;
        if (x > -80 && x < canvas.width + 80) {
          drawPixelArt(ctx, Math.round(x), 30, SPRITE_CLOUD, PALETTES.cloud);
        }
      }

      // Parallax Hills/Bushes (50% speed)
      const hillCamX = camX * 0.5;
      for (let hx = -50; hx < state.level.width * 16; hx += 240) {
        const x = hx - hillCamX;
        if (x > -100 && x < canvas.width + 100) {
          // Draw a bush sitting on the ground (y = 208).
          // Bush has 12 rows, so y position should be 208 - 12 = 196.
          drawPixelArt(ctx, Math.round(x), 196, SPRITE_CLOUD, PALETTES.bush);
        }
      }
    }

    function drawTile(ctx, tileId, tx, ty, state) {
      const tileSize = state.level.tileSize;
      const x = tx * tileSize;
      const y = ty * tileSize;

      switch (tileId) {
        case TILE.GROUND:
          drawPixelArt(ctx, x, y, SPRITES_TILES.ground, PALETTES.tiles);
          break;

        case TILE.GROUND_TOP:
          drawPixelArt(ctx, x, y, SPRITES_TILES.ground_top, PALETTES.tiles);
          break;

        case TILE.BRICK:
          drawPixelArt(ctx, x, y, SPRITES_TILES.brick, PALETTES.tiles);
          break;

        case TILE.QUESTION:
          // Question block flash animations via color cycle
          const flash = Math.floor(state.frame / 15) % 3;
          const flashPalette = { ...PALETTES.tiles };
          if (flash === 0) {
            flashPalette['M'] = '#ffe699';
            flashPalette['O'] = '#ffe699';
          } else if (flash === 1) {
            flashPalette['M'] = '#f8d878';
            flashPalette['O'] = '#c84c0c';
          } else {
            flashPalette['M'] = '#e0be50';
            flashPalette['O'] = '#783410';
          }
          drawPixelArt(ctx, x, y, SPRITES_TILES.question, flashPalette);
          break;

        case TILE.USED:
          drawPixelArt(ctx, x, y, SPRITES_TILES.used, PALETTES.tiles);
          break;

        case TILE.PIPE_TOP_LEFT:
          drawPixelArt(ctx, x, y, SPRITES_TILES.pipe_top_left, PALETTES.tiles);
          break;

        case TILE.PIPE_TOP_RIGHT:
          drawPixelArt(ctx, x, y, SPRITES_TILES.pipe_top_right, PALETTES.tiles);
          break;

        case TILE.PIPE_LEFT:
          drawPixelArt(ctx, x, y, SPRITES_TILES.pipe_left, PALETTES.tiles);
          break;

        case TILE.PIPE_RIGHT:
          drawPixelArt(ctx, x, y, SPRITES_TILES.pipe_right, PALETTES.tiles);
          break;

        case TILE.STAIR:
          drawPixelArt(ctx, x, y, SPRITES_TILES.stair, PALETTES.tiles);
          break;

        case TILE.FLAGPOLE:
          drawPixelArt(ctx, x, y, SPRITES_TILES.flagpole, PALETTES.tiles);
          break;

        case TILE.FLAG_TOP:
          drawPixelArt(ctx, x, y, SPRITES_TILES.flag_top, PALETTES.tiles);
          break;
      }
    }

    function drawPlayerSprite(ctx, player, state) {
      if (player.invulnTimer > 0 && Math.floor(state.frame / 4) % 2 === 0) {
        return; // Flash invulnerability
      }

      const form = player.form;
      const isMoving = Math.abs(player.vx) > 5;
      const isGrounded = player.grounded;
      const isSkidding = (player.vx > 10 && player.facing === -1) || (player.vx < -10 && player.facing === 1);

      let palette = PALETTES.mario;
      if (form === FORMS.CHARGED) {
        palette = PALETTES.charged_mario;
      }

      const px = Math.round(player.x);
      const py = Math.round(player.y);

      if (form === FORMS.SMALL) {
        let sprite = SPRITES_SMALL_MARIO.stand;
        if (state.mode === MODES.DYING || state.mode === MODES.GAME_OVER) {
          sprite = SPRITES_SMALL_MARIO.death;
        } else if (!isGrounded) {
          sprite = SPRITES_SMALL_MARIO.jump;
        } else if (isSkidding) {
          sprite = SPRITES_SMALL_MARIO.skid;
        } else if (isMoving) {
          const walkCycle = Math.floor(state.frame / 5) % 2;
          sprite = walkCycle === 1 ? SPRITES_SMALL_MARIO.run1 : SPRITES_SMALL_MARIO.run2;
        }
        drawPixelArt(ctx, px, py, sprite, palette, player.facing);
      } else {
        let sprite = SPRITES_LARGE_MARIO.stand;
        if (!isGrounded) {
          sprite = SPRITES_LARGE_MARIO.jump;
        } else if (isSkidding) {
          sprite = SPRITES_LARGE_MARIO.skid;
        } else if (isMoving) {
          const walkCycle = Math.floor(state.frame / 4) % 4;
          if (walkCycle === 0) sprite = SPRITES_LARGE_MARIO.run1;
          else if (walkCycle === 1 || walkCycle === 3) sprite = SPRITES_LARGE_MARIO.run2;
          else sprite = SPRITES_LARGE_MARIO.run3;
        }
        drawPixelArt(ctx, px, py, sprite, palette, player.facing);
      }
    }

    function drawEntities(ctx, state) {
      // Draw enemies
      for (const enemy of state.entities.enemies) {
        const ex = Math.round(enemy.x);
        const ey = Math.round(enemy.y);

        if (!enemy.alive) {
          drawPixelArt(ctx, ex, ey, SPRITES_GOOMBA.flat, PALETTES.goomba);
          continue;
        }

        const walkCycle = Math.floor(enemy.animationTime * 8) % 2;
        const sprite = walkCycle === 0 ? SPRITES_GOOMBA.walk1 : SPRITES_GOOMBA.walk2;
        drawPixelArt(ctx, ex, ey, sprite, PALETTES.goomba, enemy.direction);
      }

      // Draw powerups
      for (const powerup of state.entities.powerups) {
        if (!powerup.active) continue;

        const px = Math.round(powerup.x);
        const py = Math.round(powerup.y);

        if (powerup.kind === 'growth') {
          drawPixelArt(ctx, px, py, SPRITE_MUSHROOM, PALETTES.mushroom);
        } else if (powerup.kind === 'charged') {
          drawPixelArt(ctx, px, py, SPRITE_FLOWER, PALETTES.flower);
        }
      }

      // Draw projectiles
      for (const proj of state.entities.projectiles) {
        if (!proj.active) continue;

        const px = Math.round(proj.x);
        const py = Math.round(proj.y);
        drawPixelArt(ctx, px, py, SPRITE_FIREBALL, PALETTES.fireball);
      }

      // Draw flag object
      const flagObj = state.level.objects.find(obj => obj.type === 'flag');
      if (flagObj) {
        const fx = Math.round(flagObj.x);
        const fy = Math.round(flagObj.y);
        drawPixelArt(ctx, fx - 12, fy + 12, SPRITES_TILES.flag, PALETTES.tiles);
      }
    }

    function fillTextWithOutline(ctx, text, x, y, outlineColor = '#000000', fillColor = '#ffffff') {
      ctx.strokeStyle = outlineColor;
      ctx.lineWidth = 2.5;
      ctx.lineJoin = 'miter';
      ctx.miterLimit = 2;
      ctx.strokeText(text, x, y);
      ctx.fillStyle = fillColor;
      ctx.fillText(text, x, y);
    }

    function drawHUD(ctx, state) {
      ctx.font = 'bold 8px monospace';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';

      const scoreText = 'SCORE ' + String(state.score).padStart(6, '0');
      const coinsText = 'COINS ' + String(state.coins).padStart(2, '0');
      const worldText = 'WORLD 1-1';
      const timeText = 'TIME ' + String(Math.ceil(state.timeRemaining)).padStart(3, '0');
      const livesText = 'LIVES ' + String(state.lives);

      fillTextWithOutline(ctx, scoreText, 4, 6);
      fillTextWithOutline(ctx, coinsText, 66, 6);
      fillTextWithOutline(ctx, worldText, 114, 6);
      fillTextWithOutline(ctx, timeText, 168, 6);
      fillTextWithOutline(ctx, livesText, 214, 6);
    }

    function drawOverlays(ctx, state) {
      if (state.mode === MODES.PLAYING) return;

      // Darken background
      ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      if (state.mode === MODES.TITLE) {
        // Large title
        ctx.font = 'bold 18px monospace';
        fillTextWithOutline(ctx, 'ULTRA JERRIO', canvas.width / 2, 70, '#000000', '#f8d878');

        // Flashing instructions
        const flash = Math.floor(state.frame / 20) % 2 === 0;
        if (flash) {
          ctx.font = 'bold 10px monospace';
          fillTextWithOutline(ctx, 'PRESS ENTER TO START', canvas.width / 2, 110, '#000000', '#ffffff');
        }

        // Instructions (only on title overlay)
        ctx.font = '8px monospace';
        fillTextWithOutline(ctx, 'MOVE: A/D or LEFT/RIGHT ARROWS', canvas.width / 2, 150, '#000000', '#cccccc');
        fillTextWithOutline(ctx, 'JUMP: Z or SPACEBAR', canvas.width / 2, 165, '#000000', '#cccccc');
        fillTextWithOutline(ctx, 'RUN/FIRE: X or SHIFT KEY', canvas.width / 2, 180, '#000000', '#cccccc');
      } else if (state.mode === MODES.LEVEL_CLEAR) {
        ctx.font = 'bold 16px monospace';
        fillTextWithOutline(ctx, 'STAGE CLEAR!', canvas.width / 2, 90, '#000000', '#80e080');

        ctx.font = 'bold 10px monospace';
        fillTextWithOutline(ctx, 'TIME BONUS ADDED!', canvas.width / 2, 125, '#000000', '#ffe066');
        
        const flash = Math.floor(state.frame / 20) % 2 === 0;
        if (flash) {
          ctx.font = '9px monospace';
          fillTextWithOutline(ctx, 'PRESS ENTER TO PLAY AGAIN', canvas.width / 2, 160, '#000000', '#ffffff');
        }
      } else if (state.mode === MODES.GAME_OVER) {
        ctx.font = 'bold 18px monospace';
        fillTextWithOutline(ctx, 'GAME OVER', canvas.width / 2, 90, '#000000', '#d82800');

        ctx.font = '10px monospace';
        fillTextWithOutline(ctx, 'FINAL SCORE: ' + String(state.score).padStart(6, '0'), canvas.width / 2, 125, '#000000', '#ffffff');

        const flash = Math.floor(state.frame / 20) % 2 === 0;
        if (flash) {
          ctx.font = '9px monospace';
          fillTextWithOutline(ctx, 'PRESS ENTER TO RESTART', canvas.width / 2, 160, '#000000', '#ffffff');
        }
      }
    }

    // Audio synthesizer helper
    function playTone(freqs, durations, type = 'square', volume = 0.15) {
      if (!audioCtx) return;
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      
      let time = audioCtx.currentTime;
      freqs.forEach((freq, index) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = type;
        osc.frequency.setValueAtTime(freq, time);
        
        const dur = durations[index];
        
        gain.gain.setValueAtTime(volume, time);
        gain.gain.exponentialRampToValueAtTime(0.0001, time + dur);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start(time);
        osc.stop(time + dur);
        
        time += dur * 0.8;
      });
    }

    // Visual particles/effects state
    const visualEffects = [];
    let hurtFlashTimer = 0;

    function spawnFloatingText(text, x, y, color = '#ffffff') {
      visualEffects.push({
        type: 'text',
        text,
        x,
        y,
        vx: 0,
        vy: -45,
        life: 1.0,
        maxLife: 1.0,
        color
      });
    }

    function spawnSparkle(x, y) {
      for (let i = 0; i < 4; i++) {
        const angle = (i / 4) * Math.PI * 2;
        visualEffects.push({
          type: 'sparkle',
          x,
          y,
          vx: Math.cos(angle) * 30,
          vy: Math.sin(angle) * 30,
          life: 0.4,
          maxLife: 0.4,
          color: '#ffe066'
        });
      }
    }

    function spawnDebris(x, y) {
      for (let i = 0; i < 4; i++) {
        visualEffects.push({
          type: 'debris',
          x,
          y,
          vx: (Math.random() - 0.5) * 60,
          vy: -60 - Math.random() * 40,
          life: 0.6,
          maxLife: 0.6,
          color: '#b85c20'
        });
      }
    }

    function updateVisualEffects(dt) {
      for (let i = visualEffects.length - 1; i >= 0; i--) {
        const fx = visualEffects[i];
        fx.x += fx.vx * dt;
        fx.y += fx.vy * dt;
        
        if (fx.type === 'debris') {
          fx.vy += 450 * dt; // gravity
        }
        
        fx.life -= dt;
        if (fx.life <= 0) {
          visualEffects.splice(i, 1);
        }
      }
      if (hurtFlashTimer > 0) {
        hurtFlashTimer = Math.max(0, hurtFlashTimer - dt);
      }
    }

    function drawVisualEffects(ctx) {
      visualEffects.forEach(fx => {
        const alpha = Math.max(0, Math.min(1, fx.life / fx.maxLife));
        ctx.save();
        ctx.globalAlpha = alpha;
        
        const rx = Math.round(fx.x);
        const ry = Math.round(fx.y);

        if (fx.type === 'text') {
          ctx.font = 'bold 8px monospace';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.strokeStyle = '#000000';
          ctx.lineWidth = 2;
          ctx.strokeText(fx.text, rx, ry);
          ctx.fillStyle = fx.color;
          ctx.fillText(fx.text, rx, ry);
        } else if (fx.type === 'sparkle') {
          ctx.fillStyle = fx.color;
          ctx.fillRect(rx - 1, ry - 1, 2, 2);
        } else if (fx.type === 'debris') {
          ctx.fillStyle = fx.color;
          ctx.fillRect(rx - 2, ry - 2, 4, 4);
        }
        
        ctx.restore();
      });
    }

    function processEvents(events, state) {
      events.forEach(event => {
        switch (event.type) {
          case 'jump':
            playTone([200, 400, 600], [0.05, 0.05, 0.08], 'triangle', 0.15);
            break;
          case 'coin':
            playTone([987.77, 1318.51], [0.08, 0.25], 'sine', 0.15);
            const cx = event.tx * 16 + 8;
            const cy = event.ty * 16 + 8;
            spawnFloatingText('200', cx, cy - 8, '#ffe066');
            spawnSparkle(cx, cy);
            break;
          case 'powerupSpawn':
            playTone([330, 440, 550, 660], [0.07, 0.07, 0.07, 0.1], 'triangle', 0.1);
            break;
          case 'powerupCollect':
            playTone([330, 440, 550, 660, 880], [0.06, 0.06, 0.06, 0.06, 0.15], 'square', 0.1);
            if (state.player) {
              spawnFloatingText('1000', state.player.x + state.player.width / 2, state.player.y, '#80e080');
            }
            break;
          case 'stomp':
            playTone([120, 80], [0.08, 0.08], 'sawtooth', 0.15);
            const stompedEnemy = state.entities.enemies.find(e => e.id === event.enemyId);
            if (stompedEnemy) {
              spawnFloatingText('100', stompedEnemy.x + stompedEnemy.width / 2, stompedEnemy.y, '#ffffff');
            } else if (state.player) {
              spawnFloatingText('100', state.player.x + state.player.width / 2, state.player.y + state.player.height, '#ffffff');
            }
            break;
          case 'projectileHit':
            playTone([250, 350], [0.05, 0.05], 'triangle', 0.1);
            const hitEnemy = state.entities.enemies.find(e => e.id === event.enemyId);
            if (hitEnemy) {
              spawnFloatingText('200', hitEnemy.x + hitEnemy.width / 2, hitEnemy.y, '#ffffff');
              spawnSparkle(hitEnemy.x + hitEnemy.width / 2, hitEnemy.y + hitEnemy.height / 2);
            }
            break;
          case 'hurt':
            playTone([300, 200, 100], [0.1, 0.1, 0.15], 'sawtooth', 0.15);
            hurtFlashTimer = 0.25;
            break;
          case 'death':
            playTone([500, 400, 300, 150], [0.15, 0.15, 0.15, 0.4], 'square', 0.15);
            hurtFlashTimer = 0.4;
            break;
          case 'projectileFire':
            playTone([600, 900], [0.04, 0.06], 'triangle', 0.1);
            break;
          case 'levelClear':
            playTone([523.25, 659.25, 783.99, 1046.50, 783.99, 1046.50], [0.1, 0.1, 0.1, 0.15, 0.1, 0.3], 'triangle', 0.15);
            if (state.player) {
              spawnFloatingText('CLEAR!', state.player.x + state.player.width / 2, state.player.y - 12, '#80e080');
            }
            break;
          case 'blockBump':
            playTone([150], [0.1], 'triangle', 0.15);
            break;
          case 'brickBreak':
            playTone([180, 90], [0.06, 0.08], 'sawtooth', 0.15);
            const bx = event.tx * 16 + 8;
            const by = event.ty * 16 + 8;
            spawnFloatingText('50', bx, by - 8, '#ffffff');
            spawnDebris(bx, by);
            break;
        }
      });
    }

    function render(state) {
      const camX = Math.round(cameraX(state));
      
      // Clear canvas with background
      drawBackground(ctx, camX, state);

      ctx.save();
      ctx.translate(-camX, 0);

      // Render visible level tiles only
      const tileSize = state.level.tileSize;
      const minTx = Math.max(0, Math.floor(camX / tileSize));
      const maxTx = Math.min(state.level.width - 1, Math.ceil((camX + canvas.width) / tileSize));

      for (let ty = 0; ty < state.level.height; ty++) {
        for (let tx = minTx; tx <= maxTx; tx++) {
          const tile = game.getTile(tx, ty);
          if (tile && tile.id !== TILE.EMPTY) {
            drawTile(ctx, tile.id, tx, ty, state);
          }
        }
      }

      // Render entities
      drawEntities(ctx, state);

      // Render player
      if (state.player) {
        drawPlayerSprite(ctx, state.player, state);
      }

      // Render visual effects (particles)
      drawVisualEffects(ctx);

      ctx.restore();

      // Render HUD
      drawHUD(ctx, state);

      // Full screen hurt/death flash
      if (hurtFlashTimer > 0) {
        ctx.fillStyle = `rgba(216, 40, 0, ${hurtFlashTimer * 0.8})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      // Render state overlays
      drawOverlays(ctx, state);
    }

    let lastTime = 0;
    function tick(timestamp = performance.now()) {
      if (!lastTime) lastTime = timestamp;
      const dt = Math.min(0.1, (timestamp - lastTime) / 1000);
      lastTime = timestamp;

      const input = readInput();

      if (input.runFire && !runFireWasDown) {
        if (latestState.player && latestState.player.form === FORMS.CHARGED && latestState.mode === MODES.PLAYING) {
          game.fireProjectile();
        }
      }
      runFireWasDown = input.runFire;

      latestState = game.step(input);
      startPressed = false;

      // Handle event sound/visual feedback
      processEvents(latestState.events, latestState);
      updateVisualEffects(dt);

      render(latestState);
      requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);
  </script>
