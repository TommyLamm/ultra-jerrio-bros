<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>8-Bit Platformer Game</title>
  <style>
    /* Reset and centering */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      background: #121214;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
    }

    /* Keep canvas pixelated and responsive */
    canvas {
      width: min(100vw, calc(100vh * 256 / 240));
      height: auto;
      max-height: 100vh;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #5c94fc;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body>

  <canvas id="game" width="256" height="240" aria-label="8-bit platformer game"></canvas>

  <script type="module">
    import { MODES, TILE, FORMS, createGame } from './src/core/engine.js';

    const canvas = document.querySelector('#game');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    const game = createGame();
    let latestState = game.snapshot();

    const keys = new Set();
    let startPressed = false;
    let runFireWasDown = false;

    let audioCtx = null;
    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    window.addEventListener('keydown', (event) => {
      initAudio();
      if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Space'].includes(event.code)) {
        event.preventDefault();
      }
      keys.add(event.code);
      if (event.code === 'Enter') {
        startPressed = true;
      }
    });

    window.addEventListener('keyup', (event) => {
      keys.delete(event.code);
    });

    function readInput() {
      return {
        left: keys.has('ArrowLeft') || keys.has('KeyA'),
        right: keys.has('ArrowRight') || keys.has('KeyD'),
        jump: keys.has('KeyZ') || keys.has('Space'),
        runFire: keys.has('KeyX') || keys.has('ShiftLeft') || keys.has('ShiftRight'),
        start: startPressed
      };
    }

    function cameraX(state) {
      const max = state.level.width * state.level.tileSize - canvas.width;
      return Math.max(0, Math.min(max, state.player.x - 96));
    }

    function drawBackground(ctx, camX, state) {
      // Sky color
      ctx.fillStyle = '#5c94fc';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Parallax Clouds (30% speed)
      const cloudCamX = camX * 0.3;
      ctx.fillStyle = '#ffffff';
      for (let cx = -100; cx < state.level.width * 16; cx += 160) {
        const x = cx - cloudCamX;
        if (x > -80 && x < canvas.width + 80) {
          ctx.fillRect(x, 40, 48, 12);
          ctx.fillRect(x + 8, 32, 32, 8);
          ctx.fillRect(x + 16, 24, 16, 8);
        }
      }

      // Parallax Hills/Bushes (50% speed)
      const hillCamX = camX * 0.5;
      for (let hx = -50; hx < state.level.width * 16; hx += 240) {
        const x = hx - hillCamX;
        if (x > -100 && x < canvas.width + 100) {
          ctx.fillStyle = '#007800';
          ctx.beginPath();
          ctx.moveTo(x, 208);
          ctx.lineTo(x + 40, 140);
          ctx.lineTo(x + 80, 208);
          ctx.fill();

          ctx.fillStyle = '#00a800';
          ctx.beginPath();
          ctx.moveTo(x + 15, 208);
          ctx.lineTo(x + 40, 155);
          ctx.lineTo(x + 65, 208);
          ctx.fill();
        }
      }
    }

    function drawTile(ctx, tileId, tx, ty, state) {
      const tileSize = state.level.tileSize;
      const x = tx * tileSize;
      const y = ty * tileSize;

      switch (tileId) {
        case TILE.GROUND:
          ctx.fillStyle = '#c84c0c';
          ctx.fillRect(x, y, tileSize, tileSize);
          ctx.fillStyle = '#783410';
          ctx.fillRect(x + 2, y + 2, 2, 2);
          ctx.fillRect(x + 10, y + 6, 2, 2);
          ctx.fillRect(x + 6, y + 12, 2, 2);
          break;

        case TILE.GROUND_TOP:
          ctx.fillStyle = '#f8d878';
          ctx.fillRect(x, y, tileSize, 4);
          ctx.fillStyle = '#c84c0c';
          ctx.fillRect(x, y + 4, tileSize, tileSize - 4);
          ctx.fillStyle = '#783410';
          ctx.fillRect(x, y + 3, tileSize, 1);
          ctx.fillRect(x + 4, y + 8, 2, 2);
          ctx.fillRect(x + 12, y + 11, 2, 2);
          break;

        case TILE.BRICK:
          ctx.fillStyle = '#b85c20';
          ctx.fillRect(x, y, tileSize, tileSize);
          ctx.fillStyle = '#783410';
          ctx.strokeRect(x + 0.5, y + 0.5, tileSize - 1, tileSize - 1);
          ctx.fillRect(x, y + 8, tileSize, 1);
          ctx.fillRect(x + 8, y, 1, 8);
          ctx.fillRect(x + 4, y + 8, 1, 8);
          ctx.fillRect(x + 12, y + 8, 1, 8);
          break;

        case TILE.QUESTION:
          const flash = Math.floor(state.frame / 15) % 3;
          ctx.fillStyle = flash === 0 ? '#ffe699' : (flash === 1 ? '#f8d878' : '#e0be50');
          ctx.fillRect(x, y, tileSize, tileSize);
          ctx.fillStyle = '#783410';
          ctx.strokeRect(x + 0.5, y + 0.5, tileSize - 1, tileSize - 1);
          ctx.font = 'bold 11px monospace';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('?', x + tileSize / 2, y + tileSize / 2);
          ctx.fillRect(x + 2, y + 2, 1, 1);
          ctx.fillRect(x + 13, y + 2, 1, 1);
          ctx.fillRect(x + 2, y + 13, 1, 1);
          ctx.fillRect(x + 13, y + 13, 1, 1);
          break;

        case TILE.USED:
          ctx.fillStyle = '#9c6b3c';
          ctx.fillRect(x, y, tileSize, tileSize);
          ctx.fillStyle = '#783410';
          ctx.strokeRect(x + 0.5, y + 0.5, tileSize - 1, tileSize - 1);
          ctx.fillRect(x + 2, y + 2, 2, 2);
          ctx.fillRect(x + 12, y + 2, 2, 2);
          ctx.fillRect(x + 2, y + 12, 2, 2);
          ctx.fillRect(x + 12, y + 12, 2, 2);
          break;

        case TILE.PIPE_TOP_LEFT:
          ctx.fillStyle = '#00a800';
          ctx.fillRect(x, y, tileSize, tileSize);
          ctx.fillStyle = '#007800';
          ctx.fillRect(x + 10, y, 6, tileSize);
          ctx.fillStyle = '#80e080';
          ctx.fillRect(x + 1, y, 2, tileSize);
          ctx.fillStyle = '#003000';
          ctx.fillRect(x, y + tileSize - 1, tileSize, 1);
          ctx.fillRect(x, y, tileSize, 1);
          ctx.fillRect(x, y, 1, tileSize);
          break;

        case TILE.PIPE_TOP_RIGHT:
          ctx.fillStyle = '#00a800';
          ctx.fillRect(x, y, tileSize, tileSize);
          ctx.fillStyle = '#007800';
          ctx.fillRect(x + 6, y, 10, tileSize);
          ctx.fillStyle = '#003000';
          ctx.fillRect(x, y + tileSize - 1, tileSize, 1);
          ctx.fillRect(x, y, tileSize, 1);
          ctx.fillRect(x + tileSize - 1, y, 1, tileSize);
          break;

        case TILE.PIPE_LEFT:
          ctx.fillStyle = '#00a800';
          ctx.fillRect(x + 2, y, tileSize - 2, tileSize);
          ctx.fillStyle = '#007800';
          ctx.fillRect(x + 10, y, 6, tileSize);
          ctx.fillStyle = '#80e080';
          ctx.fillRect(x + 3, y, 2, tileSize);
          ctx.fillStyle = '#003000';
          ctx.fillRect(x + 2, y, 1, tileSize);
          break;

        case TILE.PIPE_RIGHT:
          ctx.fillStyle = '#00a800';
          ctx.fillRect(x, y, tileSize - 2, tileSize);
          ctx.fillStyle = '#007800';
          ctx.fillRect(x + 6, y, 8, tileSize);
          ctx.fillStyle = '#003000';
          ctx.fillRect(x + tileSize - 3, y, 1, tileSize);
          break;

        case TILE.STAIR:
          ctx.fillStyle = '#b85c20';
          ctx.fillRect(x, y, tileSize, tileSize);
          ctx.fillStyle = '#783410';
          ctx.strokeRect(x + 0.5, y + 0.5, tileSize - 1, tileSize - 1);
          ctx.fillStyle = '#f8d878';
          ctx.fillRect(x + 1, y + 1, tileSize - 2, 1);
          ctx.fillRect(x + 1, y + 1, 1, tileSize - 2);
          break;

        case TILE.FLAGPOLE:
          ctx.fillStyle = '#cccccc';
          ctx.fillRect(x + 6, y, 4, tileSize);
          ctx.fillStyle = '#783410';
          ctx.fillRect(x + 5, y, 1, tileSize);
          ctx.fillRect(x + 10, y, 1, tileSize);
          break;

        case TILE.FLAG_TOP:
          ctx.fillStyle = '#007800';
          ctx.fillRect(x + 4, y + 4, 8, 8);
          ctx.fillStyle = '#00a800';
          ctx.fillRect(x + 5, y + 5, 4, 4);
          ctx.fillStyle = '#cccccc';
          ctx.fillRect(x + 6, y + 12, 4, 4);
          break;
      }
    }

    function drawPlayerSprite(ctx, player, state) {
      if (player.invulnTimer > 0 && Math.floor(state.frame / 4) % 2 === 0) {
        return; // Flash invulnerability
      }

      ctx.save();
      ctx.translate(player.x + player.width / 2, player.y + player.height / 2);
      ctx.scale(player.facing, 1);

      const form = player.form;
      const accentColor = (form === FORMS.CHARGED) ? '#ffe066' : '#d82800';
      const clothingColor = '#203050';
      const skinColor = '#f8d878';

      if (form === FORMS.SMALL) {
        // Head
        ctx.fillStyle = accentColor;
        ctx.fillRect(-4, -7, 8, 2);
        ctx.fillRect(-2, -8, 5, 1);

        ctx.fillStyle = skinColor;
        ctx.fillRect(-3, -5, 7, 4);
        
        ctx.fillStyle = clothingColor;
        ctx.fillRect(1, -5, 2, 2);

        // Torso
        ctx.fillStyle = clothingColor;
        ctx.fillRect(-4, -1, 8, 5);
        ctx.fillStyle = accentColor;
        ctx.fillRect(-5, -1, 1, 3);
        ctx.fillRect(4, -1, 1, 3);

        // Legs / Feet
        const isMoving = Math.abs(player.vx) > 5;
        const isGrounded = player.grounded;
        const walkCycle = Math.floor(state.frame / 5) % 2;

        if (isGrounded && isMoving && walkCycle === 1) {
          ctx.fillStyle = clothingColor;
          ctx.fillRect(-3, 4, 2, 3);
          ctx.fillRect(2, 4, 2, 2);
        } else {
          ctx.fillStyle = clothingColor;
          ctx.fillRect(-4, 4, 3, 3);
          ctx.fillRect(1, 4, 3, 3);
        }
      } else {
        // Large or Charged
        // Head
        ctx.fillStyle = accentColor;
        ctx.fillRect(-5, -14, 10, 3);
        ctx.fillRect(-3, -15, 7, 1);
        
        ctx.fillStyle = skinColor;
        ctx.fillRect(-4, -11, 8, 7);
        ctx.fillStyle = clothingColor;
        ctx.fillRect(1, -11, 2, 3);

        // Body
        ctx.fillStyle = accentColor;
        ctx.fillRect(-5, -4, 10, 4);

        ctx.fillStyle = clothingColor;
        ctx.fillRect(-6, 0, 12, 10);
        ctx.fillStyle = accentColor;
        ctx.fillRect(-7, 0, 1, 6);
        ctx.fillRect(6, 0, 1, 6);

        // Legs
        const isMoving = Math.abs(player.vx) > 5;
        const isGrounded = player.grounded;
        const walkCycle = Math.floor(state.frame / 4) % 4;

        if (isGrounded && isMoving) {
          if (walkCycle === 0 || walkCycle === 2) {
            ctx.fillStyle = clothingColor;
            ctx.fillRect(-6, 10, 5, 4);
            ctx.fillRect(1, 10, 5, 4);
          } else if (walkCycle === 1) {
            ctx.fillStyle = clothingColor;
            ctx.fillRect(-5, 10, 4, 3);
            ctx.fillRect(2, 10, 4, 4);
          } else {
            ctx.fillStyle = clothingColor;
            ctx.fillRect(-6, 10, 4, 4);
            ctx.fillRect(1, 10, 4, 3);
          }
        } else if (!isGrounded) {
          ctx.fillStyle = clothingColor;
          ctx.fillRect(-6, 10, 4, 2);
          ctx.fillRect(1, 10, 5, 4);
        } else {
          ctx.fillStyle = clothingColor;
          ctx.fillRect(-6, 10, 5, 4);
          ctx.fillRect(1, 10, 5, 4);
        }
      }

      ctx.restore();
    }

    function drawEntities(ctx, state) {
      // Draw enemies
      for (const enemy of state.entities.enemies) {
        if (!enemy.alive) {
          ctx.fillStyle = '#6b3a1f';
          ctx.fillRect(enemy.x, enemy.y + 10, 14, 4);
          ctx.fillStyle = '#f8d878';
          ctx.fillRect(enemy.x + 2, enemy.y + 11, 10, 2);
          continue;
        }

        const walkCycle = Math.floor(enemy.animationTime * 8) % 2;
        ctx.fillStyle = '#6b3a1f';
        ctx.fillRect(enemy.x + 1, enemy.y + 1, 12, 10);
        ctx.fillStyle = '#f8d878';
        ctx.fillRect(enemy.x + 3, enemy.y + 4, 8, 4);
        ctx.fillStyle = '#203050';
        ctx.fillRect(enemy.x + 4, enemy.y + 5, 2, 2);
        ctx.fillRect(enemy.x + 8, enemy.y + 5, 2, 2);
        
        ctx.fillStyle = '#6b3a1f';
        if (walkCycle === 0) {
          ctx.fillRect(enemy.x + 1, enemy.y + 11, 4, 3);
          ctx.fillRect(enemy.x + 9, enemy.y + 11, 4, 2);
        } else {
          ctx.fillRect(enemy.x + 1, enemy.y + 11, 4, 2);
          ctx.fillRect(enemy.x + 9, enemy.y + 11, 4, 3);
        }
      }

      // Draw powerups
      for (const powerup of state.entities.powerups) {
        if (!powerup.active) continue;

        if (powerup.kind === 'growth') {
          ctx.fillStyle = '#00a800';
          ctx.fillRect(powerup.x + 6, powerup.y + 4, 2, 9);
          ctx.fillRect(powerup.x + 2, powerup.y + 5, 4, 3);
          ctx.fillRect(powerup.x + 8, powerup.y + 7, 4, 3);
          ctx.fillStyle = '#80e080';
          ctx.fillRect(powerup.x + 3, powerup.y + 4, 2, 1);
          ctx.fillRect(powerup.x + 9, powerup.y + 6, 2, 1);
        } else if (powerup.kind === 'charged') {
          ctx.fillStyle = '#ffe066';
          ctx.beginPath();
          ctx.moveTo(powerup.x + 9, powerup.y + 1);
          ctx.lineTo(powerup.x + 3, powerup.y + 7);
          ctx.lineTo(powerup.x + 7, powerup.y + 7);
          ctx.lineTo(powerup.x + 5, powerup.y + 13);
          ctx.lineTo(powerup.x + 11, powerup.y + 6);
          ctx.lineTo(powerup.x + 7, powerup.y + 6);
          ctx.closePath();
          ctx.fill();
        }
      }

      // Draw projectiles
      for (const proj of state.entities.projectiles) {
        if (!proj.active) continue;

        ctx.fillStyle = '#ffe066';
        ctx.fillRect(proj.x, proj.y, proj.width, proj.height);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(proj.x + 1.5, proj.y + 1.5, 3, 3);
      }

      // Draw flag object
      const flagObj = state.level.objects.find(obj => obj.type === 'flag');
      if (flagObj) {
        ctx.fillStyle = '#d82800';
        ctx.fillRect(flagObj.x - 12, flagObj.y + 12, 12, 8);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(flagObj.x - 8, flagObj.y + 14, 4, 4);
      }
    }

    function fillTextWithOutline(ctx, text, x, y, outlineColor = '#000000', fillColor = '#ffffff') {
      ctx.strokeStyle = outlineColor;
      ctx.lineWidth = 2.5;
      ctx.lineJoin = 'miter';
      ctx.miterLimit = 2;
      ctx.strokeText(text, x, y);
      ctx.fillStyle = fillColor;
      ctx.fillText(text, x, y);
    }

    function drawHUD(ctx, state) {
      ctx.font = 'bold 8px monospace';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';

      const scoreText = 'SCORE ' + String(state.score).padStart(6, '0');
      const coinsText = 'COINS ' + String(state.coins).padStart(2, '0');
      const worldText = 'WORLD 1-1';
      const timeText = 'TIME ' + String(Math.ceil(state.timeRemaining)).padStart(3, '0');
      const livesText = 'LIVES ' + String(state.lives);

      fillTextWithOutline(ctx, scoreText, 4, 6);
      fillTextWithOutline(ctx, coinsText, 66, 6);
      fillTextWithOutline(ctx, worldText, 114, 6);
      fillTextWithOutline(ctx, timeText, 168, 6);
      fillTextWithOutline(ctx, livesText, 214, 6);
    }

    function drawOverlays(ctx, state) {
      if (state.mode === MODES.PLAYING) return;

      // Darken background
      ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      if (state.mode === MODES.TITLE) {
        // Large title
        ctx.font = 'bold 18px monospace';
        fillTextWithOutline(ctx, 'ULTRA JERRIO', canvas.width / 2, 70, '#000000', '#f8d878');

        // Flashing instructions
        const flash = Math.floor(state.frame / 20) % 2 === 0;
        if (flash) {
          ctx.font = 'bold 10px monospace';
          fillTextWithOutline(ctx, 'PRESS ENTER TO START', canvas.width / 2, 110, '#000000', '#ffffff');
        }

        // Instructions (only on title overlay)
        ctx.font = '8px monospace';
        fillTextWithOutline(ctx, 'MOVE: A/D or LEFT/RIGHT ARROWS', canvas.width / 2, 150, '#000000', '#cccccc');
        fillTextWithOutline(ctx, 'JUMP: Z or SPACEBAR', canvas.width / 2, 165, '#000000', '#cccccc');
        fillTextWithOutline(ctx, 'RUN/FIRE: X or SHIFT KEY', canvas.width / 2, 180, '#000000', '#cccccc');
      } else if (state.mode === MODES.LEVEL_CLEAR) {
        ctx.font = 'bold 16px monospace';
        fillTextWithOutline(ctx, 'STAGE CLEAR!', canvas.width / 2, 90, '#000000', '#80e080');

        ctx.font = 'bold 10px monospace';
        fillTextWithOutline(ctx, 'TIME BONUS ADDED!', canvas.width / 2, 125, '#000000', '#ffe066');
        
        const flash = Math.floor(state.frame / 20) % 2 === 0;
        if (flash) {
          ctx.font = '9px monospace';
          fillTextWithOutline(ctx, 'PRESS ENTER TO PLAY AGAIN', canvas.width / 2, 160, '#000000', '#ffffff');
        }
      } else if (state.mode === MODES.GAME_OVER) {
        ctx.font = 'bold 18px monospace';
        fillTextWithOutline(ctx, 'GAME OVER', canvas.width / 2, 90, '#000000', '#d82800');

        ctx.font = '10px monospace';
        fillTextWithOutline(ctx, 'FINAL SCORE: ' + String(state.score).padStart(6, '0'), canvas.width / 2, 125, '#000000', '#ffffff');

        const flash = Math.floor(state.frame / 20) % 2 === 0;
        if (flash) {
          ctx.font = '9px monospace';
          fillTextWithOutline(ctx, 'PRESS ENTER TO RESTART', canvas.width / 2, 160, '#000000', '#ffffff');
        }
      }
    }

    // Audio synthesizer helper
    function playTone(freqs, durations, type = 'square', volume = 0.15) {
      if (!audioCtx) return;
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      
      let time = audioCtx.currentTime;
      freqs.forEach((freq, index) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = type;
        osc.frequency.setValueAtTime(freq, time);
        
        const dur = durations[index];
        
        gain.gain.setValueAtTime(volume, time);
        gain.gain.exponentialRampToValueAtTime(0.0001, time + dur);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start(time);
        osc.stop(time + dur);
        
        time += dur * 0.8;
      });
    }

    // Visual particles/effects state
    const visualEffects = [];
    let hurtFlashTimer = 0;

    function spawnFloatingText(text, x, y, color = '#ffffff') {
      visualEffects.push({
        type: 'text',
        text,
        x,
        y,
        vx: 0,
        vy: -45,
        life: 1.0,
        maxLife: 1.0,
        color
      });
    }

    function spawnSparkle(x, y) {
      for (let i = 0; i < 4; i++) {
        const angle = (i / 4) * Math.PI * 2;
        visualEffects.push({
          type: 'sparkle',
          x,
          y,
          vx: Math.cos(angle) * 30,
          vy: Math.sin(angle) * 30,
          life: 0.4,
          maxLife: 0.4,
          color: '#ffe066'
        });
      }
    }

    function spawnDebris(x, y) {
      for (let i = 0; i < 4; i++) {
        visualEffects.push({
          type: 'debris',
          x,
          y,
          vx: (Math.random() - 0.5) * 60,
          vy: -60 - Math.random() * 40,
          life: 0.6,
          maxLife: 0.6,
          color: '#b85c20'
        });
      }
    }

    function updateVisualEffects(dt) {
      for (let i = visualEffects.length - 1; i >= 0; i--) {
        const fx = visualEffects[i];
        fx.x += fx.vx * dt;
        fx.y += fx.vy * dt;
        
        if (fx.type === 'debris') {
          fx.vy += 450 * dt; // gravity
        }
        
        fx.life -= dt;
        if (fx.life <= 0) {
          visualEffects.splice(i, 1);
        }
      }
      if (hurtFlashTimer > 0) {
        hurtFlashTimer = Math.max(0, hurtFlashTimer - dt);
      }
    }

    function drawVisualEffects(ctx) {
      visualEffects.forEach(fx => {
        const alpha = Math.max(0, Math.min(1, fx.life / fx.maxLife));
        ctx.save();
        ctx.globalAlpha = alpha;
        
        if (fx.type === 'text') {
          ctx.font = 'bold 8px monospace';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.strokeStyle = '#000000';
          ctx.lineWidth = 2;
          ctx.strokeText(fx.text, fx.x, fx.y);
          ctx.fillStyle = fx.color;
          ctx.fillText(fx.text, fx.x, fx.y);
        } else if (fx.type === 'sparkle') {
          ctx.fillStyle = fx.color;
          ctx.fillRect(fx.x - 1, fx.y - 1, 2, 2);
        } else if (fx.type === 'debris') {
          ctx.fillStyle = fx.color;
          ctx.fillRect(fx.x - 2, fx.y - 2, 4, 4);
        }
        
        ctx.restore();
      });
    }

    function processEvents(events, state) {
      events.forEach(event => {
        switch (event.type) {
          case 'jump':
            playTone([200, 400, 600], [0.05, 0.05, 0.08], 'triangle', 0.15);
            break;
          case 'coin':
            playTone([987.77, 1318.51], [0.08, 0.25], 'sine', 0.15);
            const cx = event.tx * 16 + 8;
            const cy = event.ty * 16 + 8;
            spawnFloatingText('200', cx, cy - 8, '#ffe066');
            spawnSparkle(cx, cy);
            break;
          case 'powerupSpawn':
            playTone([330, 440, 550, 660], [0.07, 0.07, 0.07, 0.1], 'triangle', 0.1);
            break;
          case 'powerupCollect':
            playTone([330, 440, 550, 660, 880], [0.06, 0.06, 0.06, 0.06, 0.15], 'square', 0.1);
            if (state.player) {
              spawnFloatingText('1000', state.player.x + state.player.width / 2, state.player.y, '#80e080');
            }
            break;
          case 'stomp':
            playTone([120, 80], [0.08, 0.08], 'sawtooth', 0.15);
            const stompedEnemy = state.entities.enemies.find(e => e.id === event.enemyId);
            if (stompedEnemy) {
              spawnFloatingText('100', stompedEnemy.x + stompedEnemy.width / 2, stompedEnemy.y, '#ffffff');
            } else if (state.player) {
              spawnFloatingText('100', state.player.x + state.player.width / 2, state.player.y + state.player.height, '#ffffff');
            }
            break;
          case 'projectileHit':
            playTone([250, 350], [0.05, 0.05], 'triangle', 0.1);
            const hitEnemy = state.entities.enemies.find(e => e.id === event.enemyId);
            if (hitEnemy) {
              spawnFloatingText('200', hitEnemy.x + hitEnemy.width / 2, hitEnemy.y, '#ffffff');
              spawnSparkle(hitEnemy.x + hitEnemy.width / 2, hitEnemy.y + hitEnemy.height / 2);
            }
            break;
          case 'hurt':
            playTone([300, 200, 100], [0.1, 0.1, 0.15], 'sawtooth', 0.15);
            hurtFlashTimer = 0.25;
            break;
          case 'death':
            playTone([500, 400, 300, 150], [0.15, 0.15, 0.15, 0.4], 'square', 0.15);
            hurtFlashTimer = 0.4;
            break;
          case 'projectileFire':
            playTone([600, 900], [0.04, 0.06], 'triangle', 0.1);
            break;
          case 'levelClear':
            playTone([523.25, 659.25, 783.99, 1046.50, 783.99, 1046.50], [0.1, 0.1, 0.1, 0.15, 0.1, 0.3], 'triangle', 0.15);
            if (state.player) {
              spawnFloatingText('CLEAR!', state.player.x + state.player.width / 2, state.player.y - 12, '#80e080');
            }
            break;
          case 'blockBump':
            playTone([150], [0.1], 'triangle', 0.15);
            break;
          case 'brickBreak':
            playTone([180, 90], [0.06, 0.08], 'sawtooth', 0.15);
            const bx = event.tx * 16 + 8;
            const by = event.ty * 16 + 8;
            spawnFloatingText('50', bx, by - 8, '#ffffff');
            spawnDebris(bx, by);
            break;
        }
      });
    }

    function render(state) {
      const camX = cameraX(state);
      
      // Clear canvas with background
      drawBackground(ctx, camX, state);

      ctx.save();
      ctx.translate(-camX, 0);

      // Render visible level tiles only
      const tileSize = state.level.tileSize;
      const minTx = Math.max(0, Math.floor(camX / tileSize));
      const maxTx = Math.min(state.level.width - 1, Math.ceil((camX + canvas.width) / tileSize));

      for (let ty = 0; ty < state.level.height; ty++) {
        for (let tx = minTx; tx <= maxTx; tx++) {
          const tile = game.getTile(tx, ty);
          if (tile && tile.id !== TILE.EMPTY) {
            drawTile(ctx, tile.id, tx, ty, state);
          }
        }
      }

      // Render entities
      drawEntities(ctx, state);

      // Render player
      if (state.player) {
        drawPlayerSprite(ctx, state.player, state);
      }

      // Render visual effects (particles)
      drawVisualEffects(ctx);

      ctx.restore();

      // Render HUD
      drawHUD(ctx, state);

      // Full screen hurt/death flash
      if (hurtFlashTimer > 0) {
        ctx.fillStyle = `rgba(216, 40, 0, ${hurtFlashTimer * 0.8})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      // Render state overlays
      drawOverlays(ctx, state);
    }

    let lastTime = 0;
    function tick(timestamp = performance.now()) {
      if (!lastTime) lastTime = timestamp;
      const dt = Math.min(0.1, (timestamp - lastTime) / 1000);
      lastTime = timestamp;

      const input = readInput();

      if (input.runFire && !runFireWasDown) {
        if (latestState.player && latestState.player.form === FORMS.CHARGED && latestState.mode === MODES.PLAYING) {
          game.fireProjectile();
        }
      }
      runFireWasDown = input.runFire;

      latestState = game.step(input);
      startPressed = false;

      // Handle event sound/visual feedback
      processEvents(latestState.events, latestState);
      updateVisualEffects(dt);

      render(latestState);
      requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);
  </script>

</body>
</html>
